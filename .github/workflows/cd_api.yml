name: CD — API (Render)

on:
  workflow_run:
    workflows: ["CI — API"]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy (API)
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_API_DEPLOY_HOOK_URL }}
        run: |
          # Render's Deploy Hook is a secret, per-service URL (Render
          # Dashboard -> crop-yield-api service -> Settings -> Deploy Hook)
          # that, when POSTed to, triggers Render to pull the latest commit
          # and rebuild/redeploy the Docker image.
          response=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$RENDER_DEPLOY_HOOK_URL")
          if [ "$response" -ne 200 ] && [ "$response" -ne 201 ]; then
            echo "Render deploy hook returned HTTP $response"
            exit 1
          fi
          echo "API deploy triggered successfully (HTTP $response)"
