# .github/workflows/ci.yml
# ─────────────────────────────────────────────────────────────────────────────
# CI — Continuous Integration
# Runs on every Pull Request and every push to main.
# Responsible for: code quality, tests, coverage.
# Does NOT deploy anything.
#
# Triggers:
#   • Every PR targeting main  → validates before merge
#   • Every push to main       → confirms merge didn't break anything
 
name: CI — Crop Yield API
 
on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "gui/**"
  push:
    branches: [main]
    paths-ignore:
      - "gui/**"

jobs:
 
  test:
    name: Run Pytest
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
 
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
 
      - name: Install dependencies
        run: uv sync
 
      - name: Run tests with coverage
        run: uv run pytest -v --tb=short --cov=app --cov-report=term-missing