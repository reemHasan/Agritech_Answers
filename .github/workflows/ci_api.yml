name: CI — API

on:
  push:
    branches: [main]
    paths:
      - "app/backend/**"
      - ".github/workflows/ci_api.yml"
  pull_request:
    branches: [main]
    paths:
      - "app/backend/**"
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (including dev/test tools)
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest api/test_main.py -v

  build:
    # Validates the Docker image actually builds on every change -- catches
    # Dockerfile regressions (e.g. a broken COPY path, missing WORKDIR)
    # immediately in CI, rather than discovering them only when Render
    # attempts the same build later during deployment.
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image (no push -- validation only)
        uses: docker/build-push-action@v6
        with:
          context: ./app/backend
          file: ./app/backend/Dockerfile
          push: false
          tags: crop-yield-api:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max