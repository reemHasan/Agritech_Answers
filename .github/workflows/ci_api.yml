name: CI — API

on:
  push:
    branches: [main]
    paths:
      - "app/backend/**"
      - ".github/workflows/ci_api.yml"
  pull_request:
    branches: [main]
    paths:
      - "app/backend/**"
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (including dev/test tools)
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest api/test_main.py -v
