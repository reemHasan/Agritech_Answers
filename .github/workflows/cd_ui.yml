name: CD — UI (Render)

on:
  push:
    branches: [main]
    paths:
      - "app/frontend/**"
      - ".github/workflows/cd_ui.yml"
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy (UI)
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_UI_DEPLOY_HOOK_URL }}
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$RENDER_DEPLOY_HOOK_URL")
          if [ "$response" -ne 200 ] && [ "$response" -ne 201 ]; then
            echo "Render deploy hook returned HTTP $response"
            exit 1
          fi
          echo "UI deploy triggered successfully (HTTP $response)"
